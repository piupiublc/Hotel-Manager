<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StayMaster - Login &amp; Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        input:checked + span {
            background-color: #135bec;
            color: white;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 py-4">
<div class="flex items-center gap-3 text-primary">
<div class="size-8">
<svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">StayMaster</h2>
</div>
<div class="flex items-center gap-4">
<button class="hidden sm:flex text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary">Help Center</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold leading-normal">
<span>Sign In</span>
</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[520px] bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8 border-b border-slate-200 dark:border-slate-800">
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 mb-2">Join StayMaster</h1>
<p class="text-slate-500 dark:text-slate-400">Experience seamless stay management today.</p>
</div>
<div class="p-8">
<div class="mb-8">
<p class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-4">Account Type</p>
<div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
<label class="flex-1 cursor-pointer">
<input checked="" class="hidden peer" name="account_type" type="radio" value="customer"/>
<div class="text-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-primary peer-checked:shadow-sm text-slate-500 dark:text-slate-400">
                                        Customer
                                    </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="hidden peer" name="account_type" type="radio" value="business"/>
<div class="text-center py-2.5 rounded-lg text-sm font-semibold transition-all peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-primary peer-checked:shadow-sm text-slate-500 dark:text-slate-400">
                                        Business
                                    </div>
</label>
</div>
</div>
<!-- Customer Form -->
<div class="space-y-5" id="customer-form">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="john@example.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">call</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-colors mt-4">Create Account</button>
</div>
<!-- Business Form (Hidden by default in logic but shown here for layout) -->
<div class="space-y-5 hidden" id="business-form">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Business Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">domain</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Grand Plaza Hotel" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Owner Name</label>
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Jane Smith" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">License Number</label>
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="BUS-123456" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Category</label>
<select class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none">
<option>Hotel</option>
<option>Guesthouse</option>
<option>Resort</option>
<option>Apartment</option>
</select>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Business Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">business_center</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="contact@grandplaza.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-colors mt-4">Register Business</button>
</div>
<div class="mt-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a></p>
</div>
</div>
<div class="p-8 bg-slate-50 dark:bg-slate-800/50 flex flex-col sm:flex-row gap-4 justify-center items-center">
<p class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-bold">Or continue with</p>
<div class="flex gap-4">
<button class="p-2 px-6 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center gap-2">
<img alt="Google Logo" class="w-4 h-4" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUB_wBExSjl5EQK6yv8zPJBvSeyMDqvjpuc61LzgNXPrvYSST8isgQZGryHXPaFJnD1GYC3yORwXVbEd6g18HRw-UmnLr6kq-RxMh3RmGKgxwtveqlNxZ6f6jwc6yQl1lMMK0GIeoeDO9P4tqHoTbmQetItdD2OgmSkastgSjEFbJ99LvSaoJhdJReHau7rMezPS9xCZQM58HCEJXmJbOqDxbT1jqyLYCKOHyQJ5KPtV77HeegL7TsJ3FLxEB9cqd2geikiFcfKQpS"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="p-2 px-6 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
</div>
</div>
</main>
<footer class="p-10 text-center space-y-4">
<div class="flex justify-center gap-8 text-slate-500 dark:text-slate-400 text-sm">
<a class="hover:text-primary" href="#">Terms of Service</a>
<a class="hover:text-primary" href="#">Privacy Policy</a>
<a class="hover:text-primary" href="#">Cookies</a>
</div>
<p class="text-slate-400 dark:text-slate-500 text-xs">© 2024 StayMaster Inc. All rights reserved.</p>
</footer>
</div>
</div>
<!-- Toggle logic for the layout demo -->
<script>
        const customerRadio = document.querySelector('input[value="customer"]');
        const businessRadio = document.querySelector('input[value="business"]');
        const customerForm = document.getElementById('customer-form');
        const businessForm = document.getElementById('business-form');

        customerRadio.addEventListener('change', () => {
            if (customerRadio.checked) {
                customerForm.classList.remove('hidden');
                businessForm.classList.add('hidden');
            }
        });

        businessRadio.addEventListener('change', () => {
            if (businessRadio.checked) {
                businessForm.classList.remove('hidden');
                customerForm.classList.add('hidden');
            }
        });
    </script>
</body></html>
